<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Planche d’essai des pictogrammes Tafaron</title>
  <desc id="desc">Huit pictogrammes de contrats en line-art sombre avec accents violet, rouge, vert et jaune.</desc>
  <defs>
    <style>
      .card{fill:#fff;stroke:#172039;stroke-width:4;stroke-linejoin:round}
      .ink{fill:none;stroke:#172039;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
      .thin{fill:none;stroke:#172039;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
      .label{font:700 22px system-ui,sans-serif;fill:#172039}
      .code{font:700 16px system-ui,sans-serif;fill:#7a849b;letter-spacing:3px}
      .violet{stroke:#5b3df5}.pink{stroke:#ff5d7a}.green{stroke:#10a87b}.gold{stroke:#e5a400}.blue{stroke:#2e84e6}
      .accent-violet{fill:#5b3df5}.accent-pink{fill:#ff5d7a}.accent-green{fill:#10a87b}.accent-gold{fill:#e5a400}.accent-blue{fill:#2e84e6}
    </style>
    <g id="heart"><path d="M0 8 C-18 -8 -30 12 0 34 C30 12 18 -8 0 8Z"/></g>
    <g id="back-card"><rect class="card" x="0" y="0" width="44" height="64" rx="5"/><path class="thin" d="M8 12h28M8 22h28M8 32h28M8 42h28M8 52h28"/></g>
    <g id="queen-card"><rect class="card" x="0" y="0" width="54" height="78" rx="6"/><text x="7" y="18" font-family="system-ui" font-size="15" font-weight="900" fill="#ff5d7a">Q</text><path class="ink" d="M12 34l7-11 8 10 8-10 7 11-5 26H17z"/><circle cx="27" cy="39" r="5" fill="#ff5d7a"/><path class="thin" d="M15 68h24"/></g>
    <g id="king-card"><rect class="card" x="0" y="0" width="54" height="78" rx="6"/><text x="7" y="18" font-family="system-ui" font-size="15" font-weight="900" fill="#ff5d7a">K</text><path class="ink" d="M12 35l8-12 7 10 7-10 8 12-5 25H17z"/><path class="thin" d="M20 47h14M15 68h24"/><circle cx="27" cy="38" r="5" fill="#ff5d7a"/></g>
  </defs>
  <rect width="1280" height="720" fill="#f7f8fc"/>

  <!-- R -->
  <g transform="translate(35 35)">
    <rect width="285" height="300" rx="24" fill="#fff" stroke="#dce0f2" stroke-width="2"/>
    <g transform="translate(76 54)">
      <g transform="translate(0 0)"><rect class="card violet" width="42" height="132" rx="5"/><path class="thin" d="M10 14h22M10 28h22M10 42h22"/></g>
      <g transform="translate(43 12)"><rect class="card violet" width="42" height="120" rx="5"/><path class="thin" d="M10 14h22M10 28h22M10 42h22"/></g>
      <g transform="translate(86 28)"><rect class="card violet" width="42" height="104" rx="5"/><path class="thin" d="M10 14h22M10 28h22M10 42h22"/></g>
      <g transform="translate(129 44)"><rect class="card violet" width="42" height="88" rx="5"/><path class="thin" d="M10 14h22M10 28h22M10 42h22"/></g>
    </g>
    <text class="label" x="22" y="245">Réussite</text><text class="code" x="22" y="272">R</text>
  </g>

  <!-- D -->
  <g transform="translate(335 35)">
    <rect width="285" height="300" rx="24" fill="#fff" stroke="#dce0f2" stroke-width="2"/>
    <g transform="translate(56 78)"><use href="#queen-card"/><use href="#queen-card" transform="translate(43 0)"/><use href="#queen-card" transform="translate(86 0)"/><use href="#queen-card" transform="translate(129 0)"/>
      <path class="ink pink" d="M-8 -10L194 92"/>
    </g>
    <text class="label" x="22" y="245">Pas de dames</text><text class="code" x="22" y="272">D</text>
  </g>

  <!-- C -->
  <g transform="translate(635 35)">
    <rect width="285" height="300" rx="24" fill="#fff" stroke="#dce0f2" stroke-width="2"/>
    <g transform="translate(106 55)"><rect class="card" x="22" y="22" width="86" height="116" rx="8"/><rect class="card" x="11" y="11" width="86" height="116" rx="8"/><rect class="card" x="0" y="0" width="86" height="116" rx="8"/>
      <text x="12" y="27" font-family="system-ui" font-size="18" font-weight="800" fill="#ff5d7a">10</text><use href="#heart" transform="translate(43 52) scale(.72)" fill="#ff5d7a" stroke="#ff5d7a" stroke-width="3"/><path class="ink pink" d="M-12 -10L112 128"/>
    </g>
    <text class="label" x="22" y="245">Pas de cœur</text><text class="code" x="22" y="272">C</text>
  </g>

  <!-- K -->
  <g transform="translate(935 35)">
    <rect width="285" height="300" rx="24" fill="#fff" stroke="#dce0f2" stroke-width="2"/>
    <g transform="translate(106 55)"><rect class="card" x="22" y="22" width="86" height="116" rx="8"/><rect class="card" x="11" y="11" width="86" height="116" rx="8"/><rect class="card" x="0" y="0" width="86" height="116" rx="8"/>
      <text x="12" y="27" font-family="system-ui" font-size="20" font-weight="900" fill="#ff5d7a">K</text><use href="#heart" transform="translate(43 52) scale(.72)" fill="#ff5d7a" stroke="#ff5d7a" stroke-width="3"/><path class="ink pink" d="M-12 -10L112 128"/>
    </g>
    <text class="label" x="22" y="245">Pas le roi de cœur</text><text class="code" x="22" y="272">K</text>
  </g>

  <!-- P -->
  <g transform="translate(35 380)">
    <rect width="285" height="300" rx="24" fill="#fff" stroke="#dce0f2" stroke-width="2"/>
    <g transform="translate(67 75)"><use href="#back-card"/><use href="#back-card" transform="translate(28 0)"/><use href="#back-card" transform="translate(56 0)"/><use href="#back-card" transform="translate(84 0)"/><use href="#back-card" transform="translate(112 0)"/><path class="ink pink" d="M-8 -14L168 82"/></g>
    <text class="label" x="22" y="245">Pas de plis</text><text class="code" x="22" y="272">P</text>
  </g>

  <!-- L -->
  <g transform="translate(335 380)">
    <rect width="285" height="300" rx="24" fill="#fff" stroke="#dce0f2" stroke-width="2"/>
    <g transform="translate(67 75)"><use href="#back-card"/><use href="#back-card" transform="translate(28 0)"/><use href="#back-card" transform="translate(56 0)"/><use href="#back-card" transform="translate(84 0)"/><rect x="112" y="0" width="44" height="64" rx="5" fill="#fff3c4" stroke="#172039" stroke-width="4"/><path class="thin" d="M120 12h28M120 22h28M120 32h28M120 42h28M120 52h28"/><path class="ink pink" d="M-8 -14L168 82"/><path class="ink gold" d="M177 0v28h-17"/></g>
    <text class="label" x="22" y="245">Pas le dernier pli</text><text class="code" x="22" y="272">L</text>
  </g>

  <!-- J -->
  <g transform="translate(635 380)">
    <rect width="285" height="300" rx="24" fill="#fff" stroke="#dce0f2" stroke-width="2"/>
    <g transform="translate(102 58)"><rect class="card" width="82" height="125" rx="9"/><text x="12" y="25" font-family="system-ui" font-size="18" font-weight="900" fill="#5b3df5">J</text><path class="ink" d="M22 65c12-22 26-22 38 0-12 22-26 22-38 0z"/><path class="thin" d="M24 65h34M41 48v34"/><circle cx="41" cy="65" r="7" fill="#5b3df5"/><text x="14" y="108" font-family="system-ui" font-size="13" font-weight="800" fill="#5b3df5">JOKER</text></g>
    <text class="label" x="22" y="245">Joker</text><text class="code" x="22" y="272">J</text>
  </g>

  <!-- T -->
  <g transform="translate(935 380)">
    <rect width="285" height="300" rx="24" fill="#fff" stroke="#dce0f2" stroke-width="2"/>
    <g transform="translate(78 58) scale(.7)"><path class="card violet" d="M0 20h115v62H0z"/><path class="card violet" d="M18 0h115v62H18z"/><path class="card violet" d="M36 40h115v62H36z"/><path class="card violet" d="M54 80h115v62H54z"/><rect class="card" x="170" y="12" width="70" height="98" rx="8"/><use href="#heart" transform="translate(205 54) scale(.5)" fill="#ff5d7a" stroke="#ff5d7a" stroke-width="3"/><rect class="card" x="150" y="125" width="70" height="98" rx="8"/><path class="ink blue" d="M160 143l50 62M210 143l-50 62"/><rect class="card" x="0" y="155" width="70" height="98" rx="8"/><path class="ink gold" d="M18 205h34M35 188v34"/></g>
    <text class="label" x="22" y="245">Tafaron</text><text class="code" x="22" y="272">T</text>
  </g>
</svg>
